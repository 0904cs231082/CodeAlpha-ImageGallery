<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
</head>
<body>
    <!-- Navbar -->
     <nav class="navbar">
        <div class="logo">TravelGallery</div>
        <ul class="nav-links">
            <li><a href="#">Home </a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Explore</a></li>
        </ul>

        <button id="darkModeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
     </nav>

     <!-- Hero Section -->
      <section class="hero">
        <h1>Modern Travel Gallery</h1>
        <p>Explore Nature, cities, adventure and beautiful moments</p>
      </section>

      <!-- Filter button -->
       <section class="filter-section">
        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn " data-filter="nature">Nature</button>

         <button class="filter-btn" data-filter="travel">Travel</button>

        <button class="filter-btn" data-filter="city">City</button>

        <button class="filter-btn" data-filter="animals">Animals</button>
       </section>
</body>
</html>
